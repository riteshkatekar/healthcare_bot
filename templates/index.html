<!-- index.html -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#26333d" />
  <title>Medical Chatbot</title>

  <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">

  <style>
    body, html {
      height: 100%;
      margin: 0;
      background: linear-gradient(to right, rgb(38,51,61), rgb(50,55,65), rgb(33,33,78));
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }

    .chat {
      margin-top: auto;
      margin-bottom: auto;
    }

    .card {
      height: 560px;
      border-radius: 15px !important;
      background-color: rgba(0,0,0,0.45) !important;
      color: #e9eef6;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card-header {
      border-radius: 15px 15px 0 0 !important;
      background: rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .user_info span {
      font-size: 20px;
      color: white;
      font-weight: 700;
    }

    .user_info p {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin: 0;
    }

    .msg_card_body {
      overflow-y: auto;
      padding: 18px;
      flex: 1 1 auto;
    }

    .card-footer {
      border-radius: 0 0 15px 15px !important;
      background: rgba(0,0,0,0.08);
      padding: 12px 18px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .msg_cotainer {
      border-radius: 18px;
      background-color: rgb(82, 172, 255);
      padding: 10px 14px;
      max-width: 72%;
      word-wrap: break-word;
      font-size: 15px;
      color: #062135;
      box-shadow: 0 6px 12px rgba(0,0,0,0.35);
      position: relative;
      margin-left: 8px;
    }

    .msg_cotainer_send {
      border-radius: 18px;
      background-color: #58cc71;
      padding: 10px 14px;
      max-width: 60%;
      word-wrap: break-word;
      font-size: 15px;
      color: #042b16;
      box-shadow: 0 6px 12px rgba(0,0,0,0.35);
      position: relative;
      margin-right: 8px;
    }

    .msg_time {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      display: block;
      margin-top: 8px;
    }

    .msg_time_send {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      display: block;
      margin-top: 8px;
      text-align: right;
    }

    .msg_cotainer,
    .msg_cotainer_send {
      white-space: normal;
    }

    .assistant-message-text,
    .user-message-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user_img {
      height: 56px;
      width: 56px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.06);
      object-fit: cover;
      background: #ffd86b;
    }

    .user_img_msg {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.06);
      object-fit: cover;
    }

    .online_icon {
      position: absolute;
      height: 14px;
      width: 14px;
      background-color: #4cd137;
      border-radius: 50%;
      bottom: 0.2em;
      right: 0.2em;
      border: 1.5px solid rgba(0,0,0,0.85);
      box-shadow: 0 2px 8px rgba(76,209,55,0.12);
    }

    .thumbs_wrap{
      display:flex;
      gap:8px;
      align-items:center;
      margin-bottom:8px;
      overflow-x:auto;
      padding:6px 4px;
    }

    .thumb_item{
      position:relative;
      width:72px;
      height:72px;
      flex:0 0 72px;
      border-radius:8px;
      overflow:hidden;
      background:rgba(255,255,255,0.03);
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,0.04);
    }

    .thumb_item img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .thumb_caption{
      position:absolute;
      bottom:4px;
      left:4px;
      right:4px;
      color:#fff;
      font-size:11px;
      text-shadow:0 1px 3px rgba(0,0,0,0.5);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .thumb_remove {
      position: absolute;
      top: -8px;
      right: -8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.06);
      line-height: 1;
      padding: 0;
    }

    .thumb_spinner{
      position:absolute;
      top:6px;
      left:6px;
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.15);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      0%{transform:rotate(0)}
      100%{transform:rotate(360deg)}
    }

    .processing_list{
      margin-top:6px;
      color: rgba(255,255,255,0.85);
      font-size:13px;
    }

    .processing_item{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:6px;
    }

    .user-images-inline {
      display:flex;
      gap:8px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .user-image-chat-thumb {
      width:100px;
      height:100px;
      object-fit:cover;
      border-radius:8px;
    }

    .small_hint{
      font-size:11px;
      color: rgba(255,255,255,0.7);
      margin-left:6px;
      display: inline-block;
      margin-top: 6px;
    }

    .selected_file_chip{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 10px;
      border-radius:10px;
      background: rgba(255,255,255,0.06);
      color:#fff;
      margin-bottom:8px;
      border:1px solid rgba(255,255,255,0.05);
    }

    .selected_file_chip .chip_name{
      flex:1 1 auto;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size: 13px;
    }

    .selected_file_chip .chip_remove{
      border:0;
      background: transparent;
      color:#fff;
      font-size:18px;
      line-height:1;
      cursor:pointer;
      padding:0;
    }

    .emergency-banner{
      margin-top:8px;
      padding:8px 10px;
      border-radius:8px;
      background:#3b2a2a;
      color:#ffd6d6;
      font-weight:600;
    }

    .composer_bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 8px 10px;
      min-height: 54px;
      width: 100%;
    }

    .composer_input {
      flex: 1 1 auto;
      background: transparent !important;
      border: 0 !important;
      color: white !important;
      height: 34px !important;
      padding: 0 6px !important;
      font-size: 14px;
      border-radius: 0;
      min-width: 0;
    }

    .composer_input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .composer_input:focus {
      box-shadow: none !important;
      outline: 0;
    }

    .composer_icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.06);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .composer_icon:hover {
      background: rgba(255,255,255,0.11);
    }

    .composer_icon.active {
      background: rgba(88, 204, 113, 0.25);
      border-color: rgba(88, 204, 113, 0.35);
    }

    .composer_send {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background-color: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.06);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .composer_send:hover {
      background-color: rgba(255,255,255,0.16);
    }

    .assistant-tools-top,
    .assistant-tools-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .assistant-tools-top {
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .assistant-tools-bottom {
      margin-top: 10px;
    }

    .msg_action_btn,
    .followup_chip {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1.1;
    }

    .msg_action_btn:hover,
    .followup_chip:hover {
      background: rgba(255,255,255,0.14);
    }

    .msg_action_btn[disabled],
    .followup_chip[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .followups-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .streaming_indicator {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      min-height: 20px;
    }

    .streaming_indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      display: inline-block;
      animation: pulse 1.1s infinite ease-in-out;
    }

    .streaming_indicator span:nth-child(2) { animation-delay: .15s; }
    .streaming_indicator span:nth-child(3) { animation-delay: .3s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-3px); opacity: 1; }
    }

    @media(max-width: 576px){
      .card {
        height: auto;
      }

      .msg_cotainer{ max-width:78%; }
      .msg_cotainer_send{ max-width:90%; }
      .user-image-chat-thumb { width:72px; height:72px; }

      .composer_bar {
        gap: 6px;
        padding: 7px 8px;
        min-height: 50px;
        border-radius: 18px;
      }

      .composer_icon {
        width: 32px;
        height: 32px;
        border-radius: 9px;
      }

      .composer_send {
        width: 34px;
        height: 34px;
        border-radius: 10px;
      }

      .composer_input {
        font-size: 13px;
        height: 30px !important;
      }
    }
  </style>
</head>

<body>
  <div class="container-fluid h-100">
    <div class="row justify-content-center h-100">
      <div class="col-md-8 col-xl-6 chat">
        <div class="card">

          <div class="card-header">
            <div style="position:relative;">
              <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img" alt="bot" />
              <span class="online_icon" aria-hidden="true"></span>
            </div>
            <div class="user_info" style="margin-left:10px;">
              <span>Medical Chatbot</span>
              <p>Ask me anything!</p>
            </div>
          </div>

          <div id="messageFormeight" class="msg_card_body" role="log" aria-live="polite"></div>

          <div class="card-footer">
            <div id="thumbsContainer" class="thumbs_wrap" style="display:none;" aria-live="polite" aria-label="Image preview"></div>
            <div id="filePreview" style="display:none;"></div>
            <div id="processingList" class="processing_list" aria-live="polite"></div>

            <form id="messageArea" class="composer_bar" autocomplete="off">
              <button type="button" id="uploadBtn" class="composer_icon" title="Upload images" aria-label="Upload images">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <input id="imageInput" type="file" accept="image/*" multiple style="display:none" aria-hidden="true" />

              <button type="button" id="fileBtn" class="composer_icon" title="Upload document" aria-label="Upload document">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M14 3v6h6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <input id="fileInput" type="file" accept=".pdf,.docx,.txt,.md,.csv,.json,.html,.htm,.xml,.log" style="display:none" aria-hidden="true" />

              <input
                id="text"
                type="text"
                class="composer_input"
                placeholder="Type your message..."
                aria-label="Message"
              />

              <button type="button" id="micBtn" class="composer_icon" title="Voice input" aria-label="Voice input">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 14a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v4a3 3 0 0 0 3 3Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M19 11a7 7 0 0 1-14 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M12 18v3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>

              <button type="button" id="clearBtn" class="composer_icon" title="Clear chat" aria-label="Clear chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M9 7V4h6v3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>

              <button type="submit" id="send" class="composer_send" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 12h14M13 5l7 7-7 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
